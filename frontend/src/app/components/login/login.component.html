<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card p-4 shadow-sm" style="width: 100%; max-width: 400px;">
    <h3 class="text-center mb-4">Iniciar Sesión</h3>
    
    <form (ngSubmit)="onLogin()">
      <div class="mb-3">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" name="email" [(ngModel)]="credenciales.email" class="form-control" placeholder="admin@correo.com" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" [(ngModel)]="credenciales.password" class="form-control" placeholder="••••••••" required>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger p-2 text-center small">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2">Ingresar al Sistema</button>
    </form>
  </div>
</div>
